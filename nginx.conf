# nginx del front: sirve la SPA y reenvía /api al contenedor de la API.
# Front y API quedan en el MISMO origen -> sin CORS.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Archivos estáticos del build (con hash) -> cache largo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy a la API. "api" es el nombre del servicio en docker-compose.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA: cualquier otra ruta cae en index.html (routing del lado cliente).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
